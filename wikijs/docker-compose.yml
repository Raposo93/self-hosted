services:

 db:
   image: postgres:15-alpine
   environment:
     POSTGRES_DB: ${DB_NAME}
     POSTGRES_PASSWORD: ${DB_PASS}
     POSTGRES_USER: ${DB_USER}
   restart: unless-stopped
   volumes:
     - db-data:/var/lib/postgresql/data

 wiki:
   image: ghcr.io/requarks/wiki:latest
   depends_on:
     - db
   environment:
     DB_TYPE: postgres
     DB_HOST: db
     DB_PORT: 5432
     DB_USER: ${DB_USER}
     DB_PASS: ${DB_PASS}
     DB_NAME: ${DB_NAME}
   restart: unless-stopped
   ports:
     - "3001:3000"

volumes:
 db-data:
   driver: local
   driver_opts:
     type: none
     o: bind
     device: ${DOCKERDIR}/wikijs/db-data
